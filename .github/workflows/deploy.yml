# ─────────────────────────────────────────────────────────────────────────────
# ECommerceCenterFr – Build & Deploy to Azure Static Web Apps
# Triggers on push to main. Deploys infra via Bicep then publishes the SPA.
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

# ── Global environment ───────────────────────────────────────────────────────
env:
  AZURE_RG: rg-ecommercecenter # REPLACE_ME – your Azure resource group name
  APP_NAME: ecommercecenter # REPLACE_ME – must match Bicep param appName
  NODE_VERSION: "22"
  SWA_NAME: ecommercecenter-frontend # derived: ${APP_NAME}-frontend

permissions:
  contents: read

jobs:
  # ╭──────────────────────────────────────────╮
  # │  1. Build                                │
  # ╰──────────────────────────────────────────╯
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-package
          path: dist

  # ╭──────────────────────────────────────────╮
  # │  2. Deploy Infrastructure (Bicep)        │
  # ╰──────────────────────────────────────────╯
  infra:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      swa_name: ${{ steps.deploy-bicep.outputs.staticWebAppName }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep template
        id: deploy-bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RG }}
          template: infra/main.bicep
          parameters: >-
            appName="${{ env.APP_NAME }}"
          failOnStdErr: false

  # ╭──────────────────────────────────────────╮
  # │  3. Deploy to Azure Static Web Apps      │
  # ╰──────────────────────────────────────────╯
  deploy:
    runs-on: ubuntu-latest
    needs: [build, infra]

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-package
          path: dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ env.SWA_NAME }}" \
            --resource-group "${{ env.AZURE_RG }}" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          action: upload
          skip_app_build: true
          app_location: dist

      - name: Azure logout
        if: always()
        run: az logout
